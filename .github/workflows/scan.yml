name: scan

on:
  schedule:
    # Every 2 h at :17 (UTC). Deliberately frequent: GitHub sheds scheduled
    # runs, and at 6-hourly a single skip breached the 8 h stale cap. At 2 h
    # GitHub has to skip several in a row before the live heartbeat trips.
    - cron: "17 */2 * * *"
  workflow_dispatch: {}

concurrency:
  group: foil-scanner-data
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - run: pip install --require-hashes -r requirements.txt
      - name: Run scanner
        env:
          GCAL_SERVICE_ACCOUNT_JSON: ${{ secrets.GCAL_SERVICE_ACCOUNT_JSON }}
          FOIL_CALENDAR_ID: ${{ secrets.FOIL_CALENDAR_ID }}
        run: python -m foilscan scan
      - name: Commit verdict data
        # Partial-failure runs still write a verdict worth keeping (spec 8.9).
        if: always()
        run: |
          git config user.name "foil-scanner"
          git config user.email "actions@users.noreply.github.com"
          git add data
          git diff --cached --quiet || git commit -m "data: scan $(date -u +%FT%TZ)"
          git push
