name: scan

on:
  schedule:
    # UTC. Local AEST (UTC+10): 12:17, 18:17, 00:17, 06:17. Drifts 1 h under DST.
    - cron: "17 2,8,14,20 * * *"
  workflow_dispatch: {}

concurrency:
  group: foil-scanner-data
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Run scanner
        env:
          GCAL_SERVICE_ACCOUNT_JSON: ${{ secrets.GCAL_SERVICE_ACCOUNT_JSON }}
          FOIL_CALENDAR_ID: ${{ secrets.FOIL_CALENDAR_ID }}
        run: python -m foilscan scan
      - name: Commit verdict data
        # Partial-failure runs still write a verdict worth keeping (spec 8.9).
        if: always()
        run: |
          git config user.name "foil-scanner"
          git config user.email "actions@users.noreply.github.com"
          git add data
          git diff --cached --quiet || git commit -m "data: scan $(date -u +%FT%TZ)"
          git push
