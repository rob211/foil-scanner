name: test

on:
  push:
    branches: [main]
    # scan/live commit to data/ every ~hour; skip those, nothing to test.
    paths-ignore:
      - "data/**"
  pull_request:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - run: pip install --require-hashes -r requirements.txt
      - run: pytest
